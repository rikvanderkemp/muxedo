name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.guard.outputs.major }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard release history
        run: |
          parents="$(git rev-list --parents -n 1 HEAD)"
          parent_count="$(awk '{print NF-1}' <<<"$parents")"
          if [[ "$parent_count" -gt 1 ]]; then
            echo "Release automation requires squash merges on main."
            echo "release-please will otherwise emit duplicate changelog entries for the merge commit and the PR commit(s)."
            exit 1
          fi

      - name: Guard release metadata
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          manifest_version="$(jq -r '."."' .release-please-manifest.json)"
          changelog_version="$(sed -nE 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/p' CHANGELOG.md | head -n1)"

          if [[ -z "$manifest_version" ]]; then
            echo "release manifest is missing a root package version"
            exit 1
          fi

          if [[ -z "$changelog_version" ]]; then
            echo "CHANGELOG.md is missing a top-level release entry"
            exit 1
          fi

          if [[ "$manifest_version" != "$changelog_version" ]]; then
            echo "release manifest version $manifest_version does not match top changelog entry $changelog_version"
            exit 1
          fi

          if [[ -n "$latest_tag" ]]; then
            latest_version="${latest_tag#v}"
            greatest_version="$(printf '%s\n%s\n' "$latest_version" "$manifest_version" | sort -V | tail -n1)"
            if [[ "$greatest_version" != "$manifest_version" ]]; then
              echo "release metadata regressed below latest tag $latest_tag"
              echo "manifest version: $manifest_version"
              echo "changelog version: $changelog_version"
              exit 1
            fi
          fi

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Sync release PR body
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          if [[ -n "$PR_JSON" && "$PR_JSON" != "null" ]]; then
            pr_json="$PR_JSON"
          else
            pr_json="$(jq -c '.[0] // empty' <<<"$PRS_JSON")"
          fi

          pr_number="$(jq -r '.number // empty' <<<"$pr_json")"
          head_branch="$(jq -r '.headBranchName // .headRefName // empty' <<<"$pr_json")"

          if [[ -z "$pr_number" || -z "$head_branch" ]]; then
            echo "release-please did not return a release PR number/head branch"
            exit 1
          fi

          git fetch origin "+refs/heads/$head_branch:refs/remotes/origin/$head_branch"

          section="$(git show "origin/$head_branch:CHANGELOG.md" | awk '
            /^## \[/ {
              if (capture) exit
              capture=1
            }
            capture { print }
          ')"

          if [[ -z "$section" ]]; then
            echo "failed to extract latest release notes from CHANGELOG.md"
            exit 1
          fi

          body_file="$(mktemp)"
          {
            printf ':robot: I have created a release *beep* *boop*\n'
            printf '%s\n' '---'
            printf '\n'
            printf '\n'
            printf '%s\n' "$section"
            printf '\n'
            printf '%s\n' '---'
            printf '%s\n' 'This PR was generated with [Release Please](https://github.com/googleapis/release-please).'
            printf '%s\n' 'See [documentation](https://github.com/googleapis/release-please#release-please).'
          } >"$body_file"

          gh pr edit "$pr_number" --body-file "$body_file"

      - name: Guard major releases
        id: guard
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          major="false"
          if [[ "$TAG_NAME" =~ ^v([0-9]+)\. ]]; then
            if [[ "${BASH_REMATCH[1]}" -ge 1 ]]; then
              major="true"
            fi
          fi
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - name: Block automatic 1.x releases
        if: ${{ steps.release.outputs.release_created == 'true' && steps.guard.outputs.major == 'true' }}
        run: |
          echo "Automatic 1.x releases are disabled. Promote the repo intentionally before releasing ${TAG_NAME}."
          exit 1
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}

  build-linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.buildDate=${BUILD_DATE}'" -o muxedo .
          tar czf "muxedo_${VERSION#v}_linux_${GOARCH}.tar.gz" muxedo

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-linux-${{ matrix.goarch }}
          path: muxedo_*_linux_${{ matrix.goarch }}.tar.gz

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.buildDate=${BUILD_DATE}'" -o muxedo .
          tar czf "muxedo_${VERSION#v}_darwin_${GOARCH}.tar.gz" muxedo

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-darwin-${{ matrix.goarch }}
          path: muxedo_*_darwin_${{ matrix.goarch }}.tar.gz

  publish-assets:
    needs: [release-please, build-linux, build-macos]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: muxedo-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  dispatch-homebrew-tap:
    needs: [release-please, publish-assets]
    if: >-
      ${{
        needs.release-please.outputs.release_created == 'true' &&
        needs.release-please.outputs.major != 'true' &&
        needs.publish-assets.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew tap bump workflow
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          TOKEN: ${{ secrets.HOMEBREW_MUXEDO_DISPATCH_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "HOMEBREW_MUXEDO_DISPATCH_TOKEN is not set; skipping tap dispatch."
            echo "Add a PAT with contents:write on rikvanderkemp/homebrew-muxedo (see tap README)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/rikvanderkemp/homebrew-muxedo/dispatches" \
            -d "{\"event_type\":\"muxedo-release\",\"client_payload\":{\"tag\":\"${TAG_NAME}\"}}"
