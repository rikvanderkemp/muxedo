name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '!nobuild')) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o muxedo .
          tar czvf "muxedo_${{ github.run_id }}_${{ steps.vars.outputs.short_sha }}_linux_${{ matrix.goarch }}.tar.gz" muxedo

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-linux-${{ matrix.goarch }}
          path: muxedo_${{ github.run_id }}_*_linux_${{ matrix.goarch }}.tar.gz

  build-macos:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '!nobuild')) }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o muxedo-darwin-amd64 .
          tar czvf "muxedo_${{ github.run_id }}_${{ steps.vars.outputs.short_sha }}_darwin_amd64.tar.gz" muxedo-darwin-amd64

      - name: Build arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o muxedo-darwin-arm64 .
          tar czvf "muxedo_${{ github.run_id }}_${{ steps.vars.outputs.short_sha }}_darwin_arm64.tar.gz" muxedo-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-darwin-amd64
          path: muxedo_${{ github.run_id }}_*_darwin_amd64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-darwin-arm64
          path: muxedo_${{ github.run_id }}_*_darwin_arm64.tar.gz

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '!nobuild')) }}
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: muxedo-*
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          target_commitish: ${{ github.sha }}
          name: Build ${{ github.run_id }} (${{ github.sha }})
          body: |
            Automated build from `${{ github.ref_name }}` @ `${{ github.sha }}`

            | | |
            |-|-|
            | Run | `${{ github.run_id }}` |
            | Commit | `${{ github.sha }}` |
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
