name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.guard.outputs.major }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Guard major releases
        id: guard
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          major="false"
          if [[ "$TAG_NAME" =~ ^v([0-9]+)\. ]]; then
            if [[ "${BASH_REMATCH[1]}" -ge 1 ]]; then
              major="true"
            fi
          fi
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - name: Block automatic 1.x releases
        if: ${{ steps.release.outputs.release_created == 'true' && steps.guard.outputs.major == 'true' }}
        run: |
          echo "Automatic 1.x releases are disabled. Promote the repo intentionally before releasing ${TAG_NAME}."
          exit 1
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}

  build-linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.buildDate=${BUILD_DATE}'" -o muxedo .
          tar czf "muxedo_${VERSION#v}_linux_${GOARCH}.tar.gz" muxedo

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-linux-${{ matrix.goarch }}
          path: muxedo_*_linux_${{ matrix.goarch }}.tar.gz

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.buildDate=${BUILD_DATE}'" -o muxedo .
          tar czf "muxedo_${VERSION#v}_darwin_${GOARCH}.tar.gz" muxedo

      - uses: actions/upload-artifact@v4
        with:
          name: muxedo-darwin-${{ matrix.goarch }}
          path: muxedo_*_darwin_${{ matrix.goarch }}.tar.gz

  publish-assets:
    needs: [release-please, build-linux, build-macos]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.major != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: muxedo-*
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
