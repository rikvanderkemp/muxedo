wait = "600ms"

[[step]]
key = "esc"
wait = "750ms"

[[step]]
key = "2"
wait = "500ms"

[[step]]
key = "s"
wait = "1000ms"

[[step]]
key = "r"
wait = "1000ms"

[[step]]
key = "r"
wait = "2000ms"

[[step]]
key = "esc"
wait = "250ms"

[[step]]
key = "esc"
wait = "1250ms"

[[step]]
key = "q"
wait = "250ms"
