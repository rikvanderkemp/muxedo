# Editable local demo sequence for scripts/demo_session.py.
#
# Reorder the [[step]] blocks to change the recording flow.
cols = 100
rows = 30
profile = "profile.toml.example"
startup_wait = "3s"

[[step]]
key = "4"
wait = "500ms"

[[step]]
key = "i"
wait = "500ms"

[[step]]
